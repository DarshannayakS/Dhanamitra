{% extends 'base.html' %}
{% load static %}
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<div class="container mt-5" style="max-width: 600px;">
  <div class="card shadow-lg border-0">
    <div class="card-header bg-success text-white text-center">
      <h4><i class="bi bi-cash me-2"></i>Add New Income</h4>
    </div>

    <div class="card-body p-4">
      <form method="POST" novalidate>{% csrf_token %}
        <div class="mb-3">
          <label for="id_source" class="form-label fw-semibold">Source</label>
          {{ form.source }}
        </div>

        <div class="mb-3">
          <label for="id_amount" class="form-label fw-semibold">Amount (₹)</label>
          {{ form.amount }}
        </div>

        <button type="submit" class="btn btn-success w-100 mt-2">
          <i class="bi bi-check-circle"></i> Add Income
        </button>
      </form>

      <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100 mt-3">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
      </a>
    </div>
  </div>
</div>

<style>
  .card { border-radius: 15px; }
  label { font-weight: 600; }
  input.form-control { border-radius: 10px; padding: 10px 12px; }
  button.btn { border-radius: 30px; font-weight: 600; }
</style>
{% endblock %}
