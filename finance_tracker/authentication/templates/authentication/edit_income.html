{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="container mt-5">
  <div class="card shadow border-0 p-4" style="max-width: 600px; margin: auto;">
    <div class="card-header bg-success text-white text-center">
      <h4><i class="bi bi-pencil-square me-2"></i>Edit Income</h4>
    </div>

    <div class="card-body">
      <form method="POST" class="mt-3">{% csrf_token %}
        <div class="mb-3">
          {{ form.source.label_tag }} {{ form.source }}
        </div>
        <div class="mb-3">
          {{ form.amount.label_tag }} {{ form.amount }}
        </div>
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-check-circle"></i> Update Income
        </button>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100 mt-2">
          Cancel
        </a>
      </form>
    </div>
  </div>
</div>

{% endblock %}
