<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dhanamitra Money Friend — Sign Up</title>
    <style>
      body {
        background: linear-gradient(135deg, #14A38B 0%, #F1F8E1 100%);
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', sans-serif;
        overflow: hidden;
        position: relative;
      }
      body::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="20" cy="20" r="2" fill="%23ffffff" opacity="0.1"/><circle cx="80" cy="40" r="1.5" fill="%23ffffff" opacity="0.15"/><circle cx="60" cy="80" r="2.5" fill="%23ffffff" opacity="0.1"/><circle cx="40" cy="60" r="1" fill="%23ffffff" opacity="0.2"/><circle cx="90" cy="20" r="1.8" fill="%23ffffff" opacity="0.12"/></svg>') repeat;
        animation: float 20s linear infinite;
      }
      @keyframes float {
        0% { transform: translateY(0); }
        100% { transform: translateY(-100px); }
      }
      .center-box {
        background: rgba(255,255,255,0.95);
        border-radius: 34px;
        box-shadow: 0 8px 32px 0 rgba(20,180,139,0.15);
        padding: 64px 48px;
        text-align: center;
        position: relative;
        min-width: 380px;
        z-index: 1;
        animation: slideUp 1s ease-out;
      }
      .logo {
        width: 60px;
        margin-bottom: 20px;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .title {
        font-size: 2.5rem;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 10px;
        color: #137b60;
        animation: fadeIn 1s ease-out 0.5s both;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .tagline {
        color: #234;
        font-size: 1.1rem;
        margin-bottom: 40px;
        animation: fadeIn 1s ease-out 0.7s both;
      }
      form {
        animation: fadeIn 1s ease-out 0.9s both;
      }
      input {
        width: 100%;
        padding: 12px 16px;
        margin: 8px 0;
        border: 2px solid #e0e0e0;
        border-radius: 25px;
        font-size: 1rem;
        transition: border-color 0.3s, box-shadow 0.3s;
        box-sizing: border-box;
      }
      input:focus {
        outline: none;
        border-color: #14A38B;
        box-shadow: 0 0 8px rgba(20,163,139,0.3);
      }
      button {
        background: linear-gradient(90deg,#14A38B 60%, #7dc065 100%);
        color: #fff;
        padding: 12px 32px;
        font-size: 1.1rem;
        font-weight: 600;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        box-shadow: 0 2px 6px 0 rgba(20,180,139,0.08);
        transition: background 0.3s, transform 0.2s;
        margin-top: 20px;
        width: 100%;
      }
      button:hover {
        background: linear-gradient(90deg,#18d3a5 40%, #aad63f 100%);
        transform: translateY(-2px);
      }
      .login-link {
        margin-top: 20px;
        color: #666;
        animation: fadeIn 1s ease-out 1.1s both;
      }
      .login-link a {
        color: #14A38B;
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s;
      }
      .login-link a:hover {
        color: #7dc065;
      }
    </style>
</head>
<body>
  <div class="center-box">
    <div class="title">Join Dhanamitra</div>
    <div class="tagline">Start your journey to financial freedom</div>
    <form method="POST">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" required><br>
      <input type="email" name="email" placeholder="Email" required><br>
      <input type="password" name="password" placeholder="Password" required><br>
      <button type="submit">Register</button>
    </form>
    <p class="login-link">Already have an account? <a href="{% url 'login' %}">Login</a></p>
  </div>
</body>
</html>
